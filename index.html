<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MundoViajes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <div class="hero-content">
      <h1>MundoViajes</h1>
      <p>Planifica tu próximo viaje de forma fácil y rápida</p>
      <a href="#servicios" class="cta-button">Explorar viajes</a>
    </div>
  </header>

  <main>
    <section id="servicios" class="section servicios">
      <h2>Servicios</h2>
      <div class="cards">
        <article class="card">
          <h3>Paquetes completos</h3>
          <p>Vuelo, hotel y tours personalizados.</p>
        </article>
        <article class="card">
          <h3>Viajes familiares</h3>
          <p>Planes para toda la familia.</p>
        </article>
        <article class="card">
          <h3>Aventuras</h3>
          <p>Experiencias únicas y emocionantes.</p>
        </article>
      </div>
    </section>

    <!-- NUEVA SECCIÓN -->
    <section class="section contacto">
      <h2>Reserva tu viaje</h2>
      <form id="formulario">
        <input type="text" id="nombre" placeholder="Tu nombre" required />
        <input type="email" id="email" placeholder="Tu email" required />
        <select id="destino">
          <option value="">Selecciona destino</option>
          <option value="playa">Playa</option>
          <option value="montaña">Montaña</option>
          <option value="ciudad">Ciudad</option>
        </select>
        <button type="submit" class="cta-button">Enviar</button>
      </form>

      <p id="mensaje"></p>
    </section>
  </main>

  <footer class="footer">
    <p>MundoViajes · Proyecto TFG 2026</p>
  </footer>

  <!-- ENLACE A JS -->
  <script src="script.js"></script>
</body>
</html>
